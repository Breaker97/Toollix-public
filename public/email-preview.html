<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Template Previewer</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 20px; background-color: #f1f5f9; }
        .controls { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; display: flex; gap: 10px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        button { padding: 10px 20px; border-radius: 8px; border: 1px solid #e2e8f0; background: white; cursor: pointer; font-weight: 600; transition: all 0.2s; }
        button:hover { background: #f8fafc; border-color: #cbd5e1; }
        button.active { background: #0f172a; color: white; border-color: #0f172a; }
        iframe { width: 100%; height: 1000px; border: 1px solid #e2e8f0; border-radius: 20px; background: white; }
    </style>
</head>
<body>
    <div class="controls">
        <button onclick="loadTemplate('welcome')" id="btn-welcome" class="active">Welcome Email</button>
        <button onclick="loadTemplate('reset')" id="btn-reset">Password Reset</button>
        <button onclick="loadTemplate('upgrade')" id="btn-upgrade">Pro Upgrade</button>
    </div>
    <iframe id="preview"></iframe>

    <script>
        const goldColor = "#CD9A32";
        const brandName = "toollix";
        const brandExtension = ".io";
        const baseUrl = "http://localhost:3000";

        const ICONS = {
            WRENCH: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>`,
            PDF: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="${goldColor}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>`,
            IMAGE: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="${goldColor}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`,
            CODE: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="${goldColor}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>`,
            SHIELD: `<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="${goldColor}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>`,
            TROPHY: `<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="${goldColor}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17"/><path d="M14 14.66V17"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2z"/></svg>`
        };

        function getLayout(title, content) {
            return `
                <!DOCTYPE html>
                <html>
                <head>
                    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
                    <style>
                        body { margin: 0; padding: 0; background-color: #f8fafc; font-family: 'Outfit', sans-serif; }
                        .main { background-color: #ffffff; margin: 40px auto; width: 600px; border-radius: 32px; border: 1px solid #e2e8f0; overflow: hidden; }
                        td { font-family: 'Outfit', sans-serif; color: #1e293b; }
                    </style>
                </head>
                <body>
                    <center>
                    <table class="main" width="600" border="0" cellpadding="0" cellspacing="0">
                        <tr>
                            <td style="padding: 40px 0 20px 0;" align="center">
                                <table border="0" cellpadding="0" cellspacing="0">
                                    <tr>
                                        <td style="background-color: ${goldColor}; padding: 10px; border-radius: 12px;">
                                            <div style="color: #000;">${ICONS.WRENCH}</div>
                                        </td>
                                        <td style="padding-left: 14px;">
                                            <span style="color: #0f172a; font-size: 24px; font-weight: 900; letter-spacing: -1px;">${brandName}<span style="color: ${goldColor};">${brandExtension}</span></span>
                                        </td>
                                    </tr>
                                </table>
                            </td>
                        </tr>
                        ${content}
                        <tr>
                            <td style="padding: 40px; border-top: 1px solid #f1f5f9; text-align: center; background-color: #fbfcfe;">
                                <p style="font-size: 14px; font-weight: 800; margin-bottom: 12px; color: #0f172a;">${brandName}<span style="color: ${goldColor};">${brandExtension}</span></p>
                                <p style="font-size: 12px; color: #94a3b8; line-height: 1.6;">Precision engineering for developers. Effortless power for creators.</p>
                            </td>
                        </tr>
                    </table>
                    </center>
                </body>
                </html>
            `;
        }

        const templates = {
            welcome: getLayout("Welcome", `
                <tr>
                    <td style="padding: 0 50px 40px 50px; text-align: center;">
                        <h1 style="font-size: 42px; font-weight: 800; line-height: 1.1; margin: 0; letter-spacing: -0.04em; color: #0f172a;">Your creative engine is <span style="color: ${goldColor};">live.</span></h1>
                        <p style="font-size: 18px; color: #64748b; margin-top: 16px; line-height: 1.5;">Welcome to Toollix, John. Your workspace is ready for high-performance engineering.</p>
                    </td>
                </tr>
                <tr>
                    <td style="padding: 0 50px 40px 50px;">
                        <table width="100%" border="0" cellpadding="0" cellspacing="0">
                            <tr>
                                <td width="31%" style="background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 20px; padding: 24px;">
                                    <div style="margin-bottom: 12px;">${ICONS.PDF}</div>
                                    <p style="margin: 0; font-weight: 800; font-size: 15px; color: #0f172a;">PDF Mastery</p>
                                </td>
                                <td width="3%">&nbsp;</td>
                                <td width="31%" style="background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 20px; padding: 24px;">
                                    <div style="margin-bottom: 12px;">${ICONS.IMAGE}</div>
                                    <p style="margin: 0; font-weight: 800; font-size: 15px; color: #0f172a;">AI Imaging</p>
                                </td>
                                <td width="3%">&nbsp;</td>
                                <td width="31%" style="background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 20px; padding: 24px;">
                                    <div style="margin-bottom: 12px;">${ICONS.CODE}</div>
                                    <p style="margin: 0; font-weight: 800; font-size: 15px; color: #0f172a;">Dev Utils</p>
                                </td>
                            </tr>
                        </table>
                    </td>
                </tr>
                <tr>
                    <td style="padding: 0 50px 50px 50px;">
                        <table width="100%" style="background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); border-radius: 24px;">
                            <tr>
                                <td style="padding: 40px; text-align: center;">
                                    <h2 style="color: #ffffff; font-size: 26px; margin: 0 0 28px 0; font-weight: 800;">Enter your dashboard</h2>
                                    <a href="#" style="background-color: #ffffff; color: #000000; padding: 18px 36px; border-radius: 14px; text-decoration: none; font-weight: 900; font-size: 14px;">LAUNCH TOOLKIT &rarr;</a>
                                </td>
                            </tr>
                        </table>
                    </td>
                </tr>
            `),
            reset: getLayout("Reset Password", `
                <tr>
                    <td style="padding: 0 50px 40px 50px; text-align: center;">
                        <div style="margin-bottom: 24px; display: inline-block; background: #fdfaf1; padding: 20px; border-radius: 24px; color: ${goldColor};">
                            ${ICONS.SHIELD}
                        </div>
                        <h1 style="font-size: 36px; font-weight: 800; line-height: 1.1; margin: 0; letter-spacing: -0.04em; color: #0f172a;">Account Recovery</h1>
                        <p style="font-size: 16px; color: #64748b; margin-top: 16px;">We received a request to reset your password. Use the secure link below to proceed.</p>
                    </td>
                </tr>
                <tr>
                    <td style="padding: 0 50px 50px 50px;">
                        <table width="100%" style="background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 24px; text-align: center;">
                            <tr>
                                <td style="padding: 40px;">
                                    <a href="#" style="background-color: #0f172a; color: #ffffff; padding: 18px 40px; border-radius: 14px; text-decoration: none; font-weight: 800; font-size: 15px;">Reset My Password</a>
                                </td>
                            </tr>
                        </table>
                    </td>
                </tr>
            `),
            upgrade: getLayout("Pro Upgrade", `
                <tr>
                    <td style="padding: 0 50px 40px 50px; text-align: center;">
                        <div style="margin-bottom: 24px; display: inline-block; background: #fdfaf1; padding: 24px; border-radius: 30px; color: ${goldColor};">
                            ${ICONS.TROPHY}
                        </div>
                        <h1 style="font-size: 42px; font-weight: 800; line-height: 1.1; margin: 0; letter-spacing: -0.04em; color: #0f172a;">Welcome to <span style="color: ${goldColor};">Pro.</span></h1>
                        <p style="font-size: 18px; color: #64748b; margin-top: 16px;">Your account has been upgraded to Toollix Pro.</p>
                    </td>
                </tr>
                <tr>
                    <td style="padding: 0 50px 50px 50px;">
                        <a href="#" style="width: 100%; box-sizing: border-box; background-color: ${goldColor}; color: #000000; padding: 20px; border-radius: 16px; text-decoration: none; font-weight: 900; font-size: 16px; display: block; text-align: center;">GO TO PRO DASHBOARD &rarr;</a>
                    </td>
                </tr>
            `)
        };

        function loadTemplate(id) {
            const iframe = document.getElementById('preview');
            iframe.srcdoc = templates[id];
            
            document.querySelectorAll('button').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + id).classList.add('active');
        }

        window.onload = () => loadTemplate('welcome');
    </script>
</body>
</html>
